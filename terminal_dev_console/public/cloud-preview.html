<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cloud Preview</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #020617;
        color: #dbeafe;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 20%, rgba(37, 99, 235, 0.22), transparent 34%),
          radial-gradient(circle at 80% 78%, rgba(14, 165, 233, 0.18), transparent 32%),
          linear-gradient(180deg, #05070d, #020617);
      }

      iframe {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: none;
        border: 0;
        background: #fff;
      }

      body.is-projecting {
        display: block;
        background: #020617;
      }

      body.is-projecting iframe {
        display: block;
      }

      main {
        width: min(620px, calc(100vw - 32px));
        display: grid;
        gap: 18px;
        padding: 28px;
        border: 1px solid rgba(96, 165, 250, 0.42);
        border-radius: 14px;
        background: rgba(3, 7, 18, 0.9);
        box-shadow: 0 26px 90px rgba(0, 0, 0, 0.55), 0 0 40px rgba(37, 99, 235, 0.2);
      }

      body.is-projecting main {
        position: fixed;
        right: 14px;
        bottom: 14px;
        z-index: 2;
        width: min(440px, calc(100vw - 28px));
        gap: 8px;
        padding: 12px;
        border-radius: 10px;
        background: rgba(2, 6, 23, 0.88);
        backdrop-filter: blur(14px);
      }

      .mark {
        width: 42px;
        height: 42px;
        position: relative;
        border: 1px solid rgba(96, 165, 250, 0.8);
        border-radius: 10px;
        background: #07111f;
        box-shadow: inset 0 0 20px rgba(59, 130, 246, 0.18), 0 0 30px rgba(59, 130, 246, 0.2);
      }

      body.is-projecting .mark,
      body.is-projecting #message,
      body.is-projecting pre {
        display: none;
      }

      .mark::before,
      .mark::after {
        content: "";
        position: absolute;
        left: 13px;
        width: 15px;
        height: 3px;
        border-radius: 999px;
        background: #60a5fa;
      }

      .mark::before {
        top: 15px;
        transform: rotate(38deg);
      }

      .mark::after {
        bottom: 15px;
        transform: rotate(-38deg);
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        color: #eff6ff;
        font-size: clamp(1.35rem, 3vw, 2rem);
        letter-spacing: 0;
      }

      body.is-projecting h1 {
        font-size: 0.82rem;
      }

      p {
        color: #bfdbfe;
        line-height: 1.55;
      }

      .status {
        min-height: 44px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
        border: 1px solid rgba(96, 165, 250, 0.22);
        border-radius: 10px;
        background: rgba(15, 23, 42, 0.72);
        color: #dbeafe;
      }

      body.is-projecting .status {
        min-height: 0;
        padding: 0;
        border: 0;
        background: transparent;
      }

      .spinner {
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
        border: 2px solid rgba(147, 197, 253, 0.22);
        border-top-color: #60a5fa;
        border-radius: 999px;
        animation: spin 0.8s linear infinite;
      }

      body.is-projecting .spinner {
        width: 8px;
        height: 8px;
        border: 0;
        background: #22c55e;
      }

      pre {
        max-height: 220px;
        margin: 0;
        overflow: auto;
        padding: 12px;
        border: 1px solid rgba(96, 165, 250, 0.18);
        border-radius: 10px;
        background: #020617;
        color: #93c5fd;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        font-size: 0.78rem;
      }

      a,
      button {
        height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 13px;
        border: 1px solid rgba(96, 165, 250, 0.42);
        border-radius: 8px;
        color: #eff6ff;
        background: rgba(37, 99, 235, 0.28);
        cursor: pointer;
        font: inherit;
        font-size: 0.82rem;
        font-weight: 700;
        text-decoration: none;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      body.is-projecting .actions {
        justify-content: flex-end;
      }

      .is-error .spinner,
      .is-finished .spinner {
        animation: none;
        border-color: #60a5fa;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <iframe id="preview" title="Running cloud project preview" allow="clipboard-read; clipboard-write; fullscreen; geolocation; microphone; camera; autoplay" sandbox="allow-downloads allow-forms allow-modals allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-presentation allow-same-origin allow-scripts"></iframe>
    <main id="card">
      <div class="mark" aria-hidden="true"></div>
      <div>
        <h1>Cloud Preview</h1>
        <p id="message">Waiting for the hosted sandbox to start your project.</p>
      </div>
      <div class="status">
        <span class="spinner" aria-hidden="true"></span>
        <span id="status">Connecting to Runable...</span>
      </div>
      <pre id="logs">No logs yet.</pre>
      <div class="actions">
        <button type="button" id="retry">Reload Status</button>
        <a id="direct" href="#" target="_blank" rel="noreferrer" hidden>Open Direct Preview</a>
      </div>
    </main>

    <script>
      const params = new URLSearchParams(location.search)
      const runId = params.get('run') || ''
      const channelName = 'runable-cloud-preview'
      const storageKey = runId ? `runable-cloud-preview:${runId}` : ''
      const card = document.querySelector('#card')
      const message = document.querySelector('#message')
      const statusText = document.querySelector('#status')
      const logs = document.querySelector('#logs')
      const direct = document.querySelector('#direct')
      const retry = document.querySelector('#retry')
      const preview = document.querySelector('#preview')

      let projectedUrl = ''

      function projectPreview(url) {
        if (!url || projectedUrl === url) return
        projectedUrl = url
        preview.src = url
        document.body.classList.add('is-projecting')
        document.title = 'Running Cloud Preview'
      }

      function setState(payload = {}) {
        if (payload.runId && runId && payload.runId !== runId) return
        const status = payload.status || 'waiting'
        const nextMessage = payload.message || 'Waiting for the hosted sandbox to start your project.'
        card.className = `is-${status}`
        message.textContent = nextMessage
        statusText.textContent = payload.previewUrl
          ? 'Projecting cloud preview'
          : status.replace(/-/g, ' ')
        logs.textContent = payload.logs || logs.textContent || 'No logs yet.'

        if (payload.previewUrl) {
          direct.hidden = false
          direct.href = payload.previewUrl
          projectPreview(payload.previewUrl)
        }
      }

      function loadStoredState() {
        if (!storageKey) return
        try {
          const raw = localStorage.getItem(storageKey)
          if (raw) setState(JSON.parse(raw))
        } catch {
          // Storage can be blocked by browser policy.
        }
      }

      retry.addEventListener('click', () => {
        if (projectedUrl) {
          preview.src = projectedUrl
        }
        loadStoredState()
      })
      preview.addEventListener('load', () => {
        if (projectedUrl) statusText.textContent = 'Cloud preview loaded'
      })
      loadStoredState()
      window.setInterval(loadStoredState, 1200)

      if ('BroadcastChannel' in window) {
        try {
          const channel = new BroadcastChannel(channelName)
          channel.onmessage = (event) => setState(event.data || {})
        } catch {
          // Polling localStorage above is the fallback.
        }
      }
    </script>
  </body>
</html>
